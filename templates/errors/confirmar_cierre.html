{% extends 'base_admin.html' %}

{% block content %}
<style>
    .logout-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 80vh;
        font-family: 'Inter', sans-serif;
    }

    .logout-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04), 0 2px 10px rgba(0, 0, 0, 0.02);
        padding: 50px 40px;
        max-width: 450px;
        text-align: center;
        border: 1px solid rgba(240, 240, 240, 0.8);
        border-top: 5px solid #c49a45; /* Borde superior con el amarillo de la marca */
    }

    .icon-wrapper {
        width: 80px;
        height: 80px;
        background-color: #fdf5e6; /* Fondo tenue amarillo */
        color: #c49a45; /* Color principal */
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        margin: 0 auto 25px auto;
        box-shadow: 0 0 0 10px rgba(196, 154, 69, 0.05);
    }

    .logout-title {
        font-size: 24px;
        color: #1e293b;
        font-weight: 700;
        margin: 0 0 12px 0;
        letter-spacing: -0.5px;
    }

    .logout-text {
        color: #64748b;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .btn-cancel {
        background-color: #f1f5f9;
        color: #475569;
        padding: 12px 24px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        transition: 0.3s;
        display: inline-flex;
        align-items: center;
    }

    .btn-cancel:hover {
        background-color: #e2e8f0;
        color: #1e293b;
    }

    .btn-confirm {
        background-color: #ef4444;
        color: white;
        padding: 12px 24px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-family: 'Inter', sans-serif;
    }

    .btn-confirm:hover {
        background-color: #dc2626;
        transform: translateY(-2px);
    }
</style>

<div class="logout-container">
    <div class="logout-card">
        <div class="icon-wrapper">
            <i class="fa-solid fa-right-from-bracket"></i>
        </div>
        <h1 class="logout-title">¿Cerrar Sesión?</h1>
        <p class="logout-text">
            Estás a punto de salir del panel de administración, <strong>{{ request.user.first_name|default:"Usuario" }}</strong>. ¿Estás seguro de que deseas continuar?
        </p>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <div class="button-group">
                <a href="{% url 'dashboard' %}" class="btn-cancel">Cancelar</a>
                
                <button type="submit" class="btn-confirm">
                    <i class="fa-solid fa-power-off"></i> Sí, salir
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
