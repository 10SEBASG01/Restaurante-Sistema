{% extends 'base_admin.html' %}

{% block content %}
<style>
    /* Contenedor principal: Centra la tarjeta de confirmación vertical y horizontalmente */
    .delete-container { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 70vh; 
    }
    
    /* Tarjeta de eliminación: Fondo blanco, bordes redondeados y un borde superior
       rojo grueso que actúa como advertencia visual de una acción destructiva */
    .delete-card { 
        background: white; 
        border-radius: 16px; 
        padding: 40px; 
        max-width: 450px; 
        text-align: center; 
        box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
        border: 1px solid #f1f5f9; 
        border-top: 5px solid #ef4444; 
    }
    
    /* Icono de peligro: Círculo con fondo rojo muy claro y el icono en rojo intenso */
    .delete-icon { 
        width: 70px; 
        height: 70px; 
        background-color: #fef2f2; 
        color: #ef4444; 
        border-radius: 50%; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        font-size: 28px; 
        margin: 0 auto 20px auto; 
    }
    
    /* Título del modal: Texto destacado y en color oscuro */
    .delete-title { 
        font-size: 24px; 
        color: #1e293b; 
        margin: 0 0 10px 0; 
        font-weight: 700; 
    }
    
    /* Texto descriptivo: Explica las consecuencias de la acción, en color gris para lectura cómoda */
    .delete-text { 
        color: #64748b; 
        font-size: 15px; 
        margin-bottom: 30px; 
        line-height: 1.5; 
    }
    
    /* Contenedor de botones: Alinea los botones de cancelar y confirmar lado a lado */
    .actions { 
        display: flex; 
        gap: 15px; 
        justify-content: center; 
    }
    
    /* Botón de Cancelar: Estilo neutro (gris) para que sea la opción segura y por defecto */
    .btn-cancel { 
        background-color: #f1f5f9; 
        color: #475569; 
        padding: 12px 24px; 
        border-radius: 8px; 
        text-decoration: none; 
        font-weight: 600; 
        font-size: 14px; 
        transition: 0.3s; 
    }
    .btn-cancel:hover { 
        background-color: #e2e8f0; 
    }
    
    /* Botón de Eliminar (Peligro): Fondo rojo sólido para dejar clara la acción irreversible */
    .btn-danger { 
        background-color: #ef4444; 
        color: white; 
        padding: 12px 24px; 
        border-radius: 8px; 
        font-weight: 600; 
        font-size: 14px; 
        border: none; 
        cursor: pointer; 
        transition: 0.3s; 
    }
    .btn-danger:hover { 
        background-color: #dc2626; 
    }
</style>

<div class="delete-container">
    <div class="delete-card">
        
        <div class="delete-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h2 class="delete-title">¿Eliminar del menú?</h2>
        <p class="delete-text">
            ¿Estás completamente seguro de que deseas eliminar <strong>{{ platillo.nombre_platillo }}</strong>? Esta acción quitará el elemento de forma permanente de tu restaurante.
        </p>
        
        <form method="POST" class="actions">
            {% csrf_token %} <a href="{% url 'menu:menu_gestion' %}" class="btn-cancel">Cancelar</a>
            
            <button type="submit" class="btn-danger">Sí, Eliminar</button>
        </form>
        
    </div>
</div>
{% endblock %}
