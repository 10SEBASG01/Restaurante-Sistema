{% extends 'base_admin.html' %}

{% block content %}
<style>
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 150px);
    }
    .form-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        border: 1px solid #f1f5f9;
    }
    .form-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .form-header i {
        font-size: 40px;
        color: #c49a45;
        margin-bottom: 15px;
    }
    .form-header h2 {
        font-size: 24px;
        font-weight: 700;
        color: #1e293b;
        margin: 0 0 8px 0;
    }
    .form-header p {
        color: #64748b;
        font-size: 14px;
        margin: 0;
    }
    .input-group {
        margin-bottom: 25px;
    }
    .input-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
    }
    .custom-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 15px;
        color: #1e293b;
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
    }
    .custom-input:focus {
        border-color: #c49a45;
        box-shadow: 0 0 0 3px rgba(196, 154, 69, 0.1);
    }
    .actions {
        display: flex;
        gap: 15px;
    }
    .btn-cancelar {
        flex: 1;
        background: #f1f5f9;
        color: #475569;
        padding: 12px;
        text-align: center;
        border-radius: 8px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.2s;
        border: 1px solid #e2e8f0;
    }
    .btn-cancelar:hover {
        background: #e2e8f0;
        color: #1e293b;
    }
    .btn-guardar {
        flex: 1;
        background: #c49a45;
        color: white;
        padding: 12px;
        text-align: center;
        border-radius: 8px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-guardar:hover {
        background: #c49a45;
    }
</style>

<div class="form-wrapper">
    <div class="form-card">
        <div class="form-header">
            <i class="fa-solid fa-folder-plus"></i>
            <h2>Nueva Categoría</h2>
            <p>Añade una nueva pestaña al menú del restaurante.</p>
        </div>

        <form method="POST" action="">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="nombre_categoria">Nombre de la Categoría</label>
                <input type="text" 
                       id="nombre_categoria" 
                       name="nombre_categoria" 
                       class="custom-input" 
                       placeholder="Ej. Bebidas Calientes, Combos Familiares..." 
                       required 
                       autofocus>
            </div>

            <div class="actions">
                <a href="{% url 'menu:menu_gestion' %}" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-guardar">Guardar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
