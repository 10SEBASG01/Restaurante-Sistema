{% extends 'base_admin.html' %}

{% block content %}
<style>
    /* Cabecera de la página con icono */
    .header-wrapper { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
    .header-icon {
        width: 50px; height: 50px; border-radius: 50%;
        border: 2px solid #fef08a; display: flex; justify-content: center;
        align-items: center; color: #c49a45; font-size: 22px;
    }
    .page-header { margin: 0; }
    .page-title { font-size: 28px; color: #1e293b; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
    .page-subtitle { color: #64748b; font-size: 15px; margin-top: 6px; }

    /* Tarjeta del formulario */
    .form-card { 
        background: rgba(255, 255, 255, 0.98); 
        border-radius: 16px; 
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03), 0 2px 10px rgba(0, 0, 0, 0.02); 
        padding: 40px; 
        max-width: 600px; /* Ancho más compacto para formularios genéricos/cortos */
        border: 1px solid rgba(240, 240, 240, 0.8); 
        margin: 10px auto;
    }
    
    /* Grupos y Etiquetas */
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; position: relative; }
    .form-group label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #334155; }
    .form-group label i { color: #c49a45; font-size: 14px; }
    
    /* Estilos globales para cualquier input generado por el loop de Django */
    .form-group input[type="text"],
    .form-group input[type="number"],
    .form-group input[type="password"],
    .form-group input[type="email"],
    .form-group select,
    .form-group textarea {
        padding: 14px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 14px;
        color: #1e293b;
        background-color: #f8fafc;
        transition: all 0.3s ease;
        outline: none;
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { 
        border-color: #c49a45; 
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(196, 154, 69, 0.1); 
    }

    /* Input con borde de error */
    .form-group .is-invalid {
        border-color: #ef4444 !important;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        background-color: #fef2f2 !important;
    }

    /* Alerta de error personalizada para Django errors */
    .custom-error-alert {
        background-color: #fef2f2;
        border: 1px solid #fee2e2;
        color: #ef4444;
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 4px;
        font-size: 13px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    /* Botones */
    .form-actions { 
        display: flex; justify-content: flex-end; gap: 15px; 
        margin-top: 35px; padding-top: 25px; border-top: 1px solid #f1f5f9; 
    }
    
    .btn-gold { 
        background-color: #c49a45; color: white; padding: 12px 28px; border-radius: 10px; 
        text-decoration: none; font-size: 15px; font-weight: 600; border: none; cursor: pointer; 
        transition: 0.3s; box-shadow: 0 4px 10px rgba(196, 154, 69, 0.2);
        display: flex; align-items: center; gap: 8px;
    }
    .btn-gold:hover { background-color: #b0883b; transform: translateY(-1px); }
    
    .btn-cancel { 
        background-color: #ffffff; border: 1px solid #e2e8f0; color: #475569; padding: 12px 28px; border-radius: 10px; 
        text-decoration: none; font-size: 15px; font-weight: 600; transition: 0.3s; 
        display: flex; align-items: center; gap: 8px;
    }
    .btn-cancel:hover { background-color: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
</style>

<div class="header-wrapper">
    <div class="header-icon">
        <i class="fa-solid fa-sliders"></i>
    </div>
    <div class="page-header">
        <h1 class="page-title">{{ titulo }}: <span style="color:#c49a45;">Mesa {{ mesa.numero }}</span></h1>
        <p class="page-subtitle">{{ subtitulo }}</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" novalidate id="genericDynamicForm">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">
                    <i class="fa-solid fa-caret-right"></i> {{ field.label }}
                </label>
                
                {{ field }}
                
                <!-- Contenedor dinámico para errores de JS si es de tipo number -->
                <div class="custom-error-alert js-error-alert" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span class="js-error-text"></span>
                </div>

                {% if field.errors %}
                    <div class="custom-error-alert">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>{% for error in field.errors %}{{ error }}{% endfor %}</span>
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <div class="form-actions">
            <a href="{% url 'estado_mesas' %}" class="btn-cancel"><i class="fa-solid fa-xmark"></i> Cancelar</a>
            <button type="submit" class="btn-gold"><i class="fa-solid fa-floppy-disk"></i> Guardar Cambios</button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('genericDynamicForm');
        
        // Función genérica para validar cualquier input numérico que Django renderice
        const numberInputs = form.querySelectorAll('input[type="number"]');
        
        function validarEnteroPositivo(input) {
            const errorAlert = input.parentElement.querySelector('.js-error-alert');
            const errorSpan = errorAlert.querySelector('.js-error-text');
            const valor = parseInt(input.value, 10);
            
            if (input.value !== '' && (isNaN(valor) || valor < 1)) {
                errorSpan.innerText = 'El valor debe ser un entero a partir de 1. No se admite 0.';
                errorAlert.style.display = 'flex';
                input.classList.add('is-invalid');
                return false;
            } else {
                errorAlert.style.display = 'none';
                input.classList.remove('is-invalid');
                return true;
            }
        }

        numberInputs.forEach(input => {
            // Asegurar que no se ingrese 0 u otros caracteres inválidos (Regla de integridad)
            input.setAttribute('min', '1');
            input.setAttribute('step', '1');
            
            input.addEventListener('input', () => validarEnteroPositivo(input));
            
            input.addEventListener('keydown', function(e) {
                if (e.key === '-' || e.key === 'e' || e.key === 'E' || e.key === '.' || e.key === ',') {
                    e.preventDefault();
                }
                if (e.key === '0' && this.value === '') {
                    e.preventDefault();
                }
            });
        });

        // Validar antes de enviar
        form.addEventListener('submit', function(e) {
            let isValid = true;
            let firstInvalidInput = null;

            numberInputs.forEach(input => {
                if (!validarEnteroPositivo(input)) {
                    isValid = false;
                    if (!firstInvalidInput) firstInvalidInput = input;
                }
            });

            if (!isValid) {
                e.preventDefault();
                if (firstInvalidInput) firstInvalidInput.focus();
            }
        });
    });
</script>
{% endblock %}
