{% extends 'base_admin.html' %}

{% block content %}
<style>
    /* ====================================================================
       BLOQUE 1: CSS - ESTILOS VISUALES DE LA INTERFAZ
       ==================================================================== */

    /* Cabecera de la página con icono */
    .header-wrapper { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
    .header-icon {
        width: 50px; height: 50px; border-radius: 50%;
        border: 2px solid #fef08a; display: flex; justify-content: center;
        align-items: center; color: #c49a45; font-size: 22px;
    }
    .page-header { margin: 0; }
    .page-title { font-size: 28px; color: #1e293b; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
    .page-subtitle { color: #64748b; font-size: 15px; margin-top: 6px; }

    /* Tarjeta contenedora del formulario */
    .form-card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03), 0 2px 10px rgba(0, 0, 0, 0.02);
        padding: 40px;
        max-width: 800px;
        border: 1px solid rgba(240, 240, 240, 0.8);
        margin: 10px auto;
    }

    /* Grid de distribución interna (2 columnas por defecto) */
    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        margin-bottom: 20px;
    }
    
    /* Clase modificadora para forzar a un campo a ocupar todo el ancho */
    .full-width { grid-column: span 2; }

    /* Estilos de los grupos de campos y sus respectivas etiquetas */
    .form-group { display: flex; flex-direction: column; gap: 8px; position: relative; }
    .form-group label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #334155; }
    .form-group label i { color: #c49a45; font-size: 15px; }
    
    /* Normalización estética para los elementos Inputs y Selects */
    .form-group input[type="text"],
    .form-group input[type="number"],
    .form-group select {
        padding: 14px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 14px;
        color: #1e293b;
        background-color: #f8fafc;
        transition: all 0.3s ease;
        outline: none;
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
    }
    
    /* Estados de enfoque (Focus) */
    .form-group input:focus,
    .form-group select:focus {
        border-color: #c49a45;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(196, 154, 69, 0.1);
    }

    /* Modificador visual para inputs que presenten errores de validación */
    .form-group input.is-invalid {
        border-color: #ef4444 !important;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        background-color: #fef2f2 !important;
    }

    /* Alerta de error estilizada para mostrar mensajes del backend */
    .custom-error-alert {
        background-color: #fef2f2;
        border: 1px solid #fee2e2;
        color: #ef4444;
        padding: 10px 14px;
        border-radius: 8px;
        margin-top: 4px;
        font-size: 13px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
    }

    /* Botonera inferior de acciones */
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 35px;
        padding-top: 25px;
        border-top: 1px solid #f1f5f9;
    }
    
    /* Botón principal (Estilo dorado) */
    .btn-gold { 
        background-color: #c49a45; color: white; padding: 12px 28px; border-radius: 10px; 
        text-decoration: none; font-size: 15px; font-weight: 600; border: none; cursor: pointer; 
        transition: 0.3s; box-shadow: 0 4px 10px rgba(196, 154, 69, 0.2);
        display: flex; align-items: center; gap: 8px;
    }
    .btn-gold:hover { background-color: #b0883b; transform: translateY(-1px); }
    
    /* Botón secundario (Estilo cancelar/blanco) */
    .btn-cancel { 
        background-color: #ffffff; border: 1px solid #e2e8f0; color: #475569; padding: 12px 28px; border-radius: 10px; 
        text-decoration: none; font-size: 15px; font-weight: 600; transition: 0.3s; 
        display: flex; align-items: center; gap: 8px;
    }
    .btn-cancel:hover { background-color: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
</style>

<div class="header-wrapper">
    <div class="header-icon">
        <i class="fa-solid fa-map"></i>
    </div>
    <div class="page-header">
        <h1 class="page-title">Registrar Nueva Zona</h1>
        <p class="page-subtitle">Define un área nueva (ej. Balcón, Salón Principal) para agrupar tus mesas.</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" autocomplete="off">
        {% csrf_token %}
        
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="{{ form.nombre_zona.id_for_label }}">
                    <i class="fa-solid fa-tag"></i> {{ form.nombre_zona.label|default:"Nombre de la Zona" }}
                </label>
                
                {{ form.nombre_zona }}
                
                {% if form.nombre_zona.errors %}
                    <div class="custom-error-alert">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>{{ form.nombre_zona.errors|first }}</span>
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'listar_zonas' %}" class="btn-cancel"><i class="fa-solid fa-xmark"></i> Cancelar</a>
            <button type="submit" class="btn-gold"><i class="fa-solid fa-floppy-disk"></i> Guardar Ubicación</button>
        </div>
        
    </form>
</div>
{% endblock %}
