<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Arte RESTAURANTE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --gold-primary: #bc8e36;
            --gold-light: #dfcaa4;
            --bg-color: #faf9f7;
            --text-dark: #2c2c2c;
            --text-gray: #7a7a7a;
            --nav-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
        }

        /* Barra de navegación pública */
        .navbar-publica {
            background: var(--nav-bg);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        .navbar-brand {
            font-family: 'Great Vibes', cursive;
            color: var(--gold-primary);
            font-size: 32px;
            font-weight: 400;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            line-height: 1;
        }

        .navbar-brand i {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 22px;
        }

        /* Enlaces (Desktop) */
        .navbar-links {
            display: flex;
            gap: 30px;
            list-style: none;
            transition: all 0.3s ease;
        }

        .navbar-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-links a i {
            color: var(--gold-light);
            transition: color 0.3s ease;
        }

        .navbar-links a:hover, 
        .navbar-links a.active {
            color: var(--gold-primary);
        }

        .navbar-links a:hover i {
            color: var(--gold-primary);
        }

        /* Botón de Menú (Oculto en Desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--gold-primary);
            cursor: pointer;
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .contenido-principal {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            position: relative;
            animation: fadeInContent 0.3s ease-out forwards;
        }

        /* Footer Global */
        .footer-publico {
            text-align: center;
            padding: 25px 15px;
            font-size: 0.8rem;
            color: var(--text-gray);
            border-top: 1px solid #e5e5e5;
            background-color: var(--bg-color);
            margin-top: auto;
        }

        /* --- AJUSTES RESPONSIVOS PARA TELÉFONOS (MOBILE FIRST) --- */
        @media(max-width: 768px){
            .navbar-publica {
                padding: 15px 20px;
            }

            .mobile-menu-btn {
                display: block; /* Muestra el botón de hamburguesa */
            }

            .navbar-links {
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--nav-bg);
                box-shadow: 0 10px 15px rgba(0,0,0,0.05);
                gap: 0;
                /* Propiedades para el menú colapsado */
                max-height: 0;
                overflow: hidden;
                opacity: 0;
            }

            /* Clase que se activa mediante JavaScript */
            .navbar-links.active {
                max-height: 300px;
                opacity: 1;
                border-top: 1px solid #f0f0f0;
            }

            .navbar-links li {
                width: 100%;
                text-align: center;
            }

            .navbar-links a {
                padding: 15px 20px;
                justify-content: center;
                font-size: 16px;
                border-bottom: 1px solid #f9f9f9;
            }
            
            .navbar-links li:last-child a {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar-publica">
        <a href="{% url 'publico:inicio' %}" class="navbar-brand">
            <i class="fa-solid fa-utensils"></i> Sabor & Arte
        </a>
        
        <!-- Botón para móviles -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <ul class="navbar-links" id="navbarLinks">
            <li>
                <a href="{% url 'publico:inicio' %}">
                    <i class="fa-solid fa-house"></i> Inicio
                </a>
            </li>
            <li>
                <a href="{% url 'publico:menu_publico' %}">
                    <i class="fa-solid fa-book-open"></i> Menú
                </a>
            </li>
            <li>
                <a href="{% url 'publico:reserva_publica' %}">
                    <i class="fa-solid fa-chair"></i> Reservar
                </a>
            </li>
        </ul>
    </nav>

    <main class="contenido-principal">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer-publico">
        © 2026 Sabor & Arte RESTAURANTE. Todos los derechos reservados. | Soporte Técnico
    </footer>

    <!-- Script para funcionalidad del menú en móviles -->
    <script>
        const btnMobile = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navbarLinks');
        const icon = btnMobile.querySelector('i');

        btnMobile.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            
            // Cambia el ícono de hamburguesa a la 'X' para cerrar
            if (navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        });
    </script>
</body>
</html>
