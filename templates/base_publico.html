<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor & Arte RESTAURANTE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --gold-primary: #bc8e36;
            --gold-light: #dfcaa4;
            --bg-color: #faf9f7;
            --text-dark: #2c2c2c;
            --text-gray: #7a7a7a;
            --nav-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
        }

        /* Barra de navegación pública */
        .navbar-publica {
            background: var(--nav-bg);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        .navbar-brand {
            font-family: 'Great Vibes', cursive;
            color: var(--gold-primary);
            font-size: 32px;
            font-weight: 400;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            line-height: 1;
        }

        /* Ajuste para que el icono no tome la fuente cursiva */
        .navbar-brand i {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 22px;
        }

        .navbar-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .navbar-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-links a i {
            color: var(--gold-light);
            transition: color 0.3s ease;
        }

        .navbar-links a:hover, 
        .navbar-links a.active {
            color: var(--gold-primary);
        }

        .navbar-links a:hover i {
            color: var(--gold-primary);
        }

        /* NUEVO: Animación de entrada suave para el contenido */
        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .contenido-principal {
            flex: 1; /* Permite que el contenido empuje el footer hacia abajo */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            position: relative;
            /* Se aplica la animación aquí */
            animation: fadeInContent 0.3s ease-out forwards;
        }

        /* Footer Global */
        .footer-publico {
            text-align: center;
            padding: 25px 15px;
            font-size: 0.8rem;
            color: var(--text-gray);
            border-top: 1px solid #e5e5e5;
            background-color: var(--bg-color);
            margin-top: auto;
        }

        /* Ajustes responsivos para la navegación */
        @media(max-width: 768px){
            .navbar-publica {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 15px 20px;
            }
            .navbar-links {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar-publica">
        <a href="{% url 'publico:inicio' %}" class="navbar-brand">
            <i class="fa-solid fa-utensils"></i> Sabor & Arte
        </a>
        <ul class="navbar-links">
            <li>
                <a href="{% url 'publico:inicio' %}">
                    <i class="fa-solid fa-house"></i> Inicio
                </a>
            </li>
            <li>
                <a href="{% url 'publico:menu_publico' %}">
                    <i class="fa-solid fa-book-open"></i> Menú
                </a>
            </li>
            <li>
                <a href="{% url 'publico:reserva_publica' %}">
                    <i class="fa-solid fa-chair"></i> Reservar
                </a>
            </li>
        </ul>
    </nav>

    <main class="contenido-principal">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer-publico">
        © 2026 Sabor & Arte RESTAURANTE. Todos los derechos reservados. | Soporte Técnico
    </footer>

</body>
</html>
